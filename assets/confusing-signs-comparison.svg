<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f7f7f2"/>
  <text x="60" y="70" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="38" font-weight="700" fill="#222">易混淆標誌比較表</text>
  <rect x="70" y="130" width="1060" height="560" rx="16" fill="#fff" stroke="#ddd"/>
  <line x1="70" y1="235" x2="1130" y2="235" stroke="#ddd" stroke-width="4"/>
  <line x1="70" y1="365" x2="1130" y2="365" stroke="#ddd" stroke-width="4"/>
  <line x1="70" y1="495" x2="1130" y2="495" stroke="#ddd" stroke-width="4"/>
  <line x1="420" y1="130" x2="420" y2="690" stroke="#ddd" stroke-width="4"/>
  <line x1="780" y1="130" x2="780" y2="690" stroke="#ddd" stroke-width="4"/>
  <text x="115" y="190" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="700" fill="#222">禁止停車</text>
  <text x="475" y="190" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="700" fill="#222">禁止臨時停車</text>
  <text x="835" y="190" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" fill="#333">差別：能否短暫上下客貨</text>
  <circle cx="160" cy="300" r="45" fill="#0057a8" stroke="#b00020" stroke-width="10"/>
  <line x1="128" y1="332" x2="192" y2="268" stroke="#b00020" stroke-width="10"/>
  <circle cx="520" cy="300" r="45" fill="#0057a8" stroke="#b00020" stroke-width="10"/>
  <line x1="488" y1="332" x2="552" y2="268" stroke="#b00020" stroke-width="10"/>
  <line x1="488" y1="268" x2="552" y2="332" stroke="#b00020" stroke-width="10"/>
  <text x="835" y="306" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" fill="#333">兩斜線更嚴格，通常連臨停也不可。</text>
  <text x="115" y="440" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="700" fill="#222">讓路</text>
  <text x="475" y="440" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="700" fill="#222">停車再開</text>
  <text x="835" y="440" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" fill="#333">差別：讓路不一定停，停車再開必停。</text>
  <polygon points="160,530 100,625 220,625" fill="#fff" stroke="#b00020" stroke-width="10"/>
  <text x="127" y="604" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="32" font-weight="700" fill="#111">讓</text>
  <polygon points="520,510 562,528 580,570 562,612 520,630 478,612 460,570 478,528" fill="#b00020"/>
  <text x="487" y="583" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="30" font-weight="700" fill="#fff">停</text>
  <text x="835" y="575" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" fill="#333">看到八角形優先記「完全停止」。</text>
</svg>
