<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f7f7f2"/>
  <text x="60" y="70" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="38" font-weight="700" fill="#222">中華民國道路交通標誌：形狀與顏色速記</text>
  <text x="60" y="112" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#555">考試先判斷顏色與形狀，再讀圖案或文字。</text>

  <polygon points="160,180 80,320 240,320" fill="#fff" stroke="#b00020" stroke-width="16"/>
  <path d="M160 235 C140 245 135 275 155 292 C173 306 198 290 193 268 C190 248 177 238 160 235" fill="none" stroke="#111" stroke-width="10"/>
  <text x="60" y="370" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26" font-weight="700" fill="#222">警告標誌</text>
  <text x="60" y="405" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#444">紅邊白底三角形</text>
  <text x="60" y="435" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#444">前方有特殊路況，減速注意。</text>

  <circle cx="440" cy="250" r="88" fill="#fff" stroke="#b00020" stroke-width="16"/>
  <line x1="380" y1="310" x2="500" y2="190" stroke="#b00020" stroke-width="18"/>
  <text x="372" y="260" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="42" font-weight="700" fill="#111">P</text>
  <text x="340" y="370" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26" font-weight="700" fill="#222">禁制標誌</text>
  <text x="340" y="405" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#444">多為紅色或圓形</text>
  <text x="340" y="435" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#444">禁止、限制或命令遵行。</text>

  <rect x="650" y="170" width="180" height="160" rx="14" fill="#0057a8"/>
  <path d="M740 205 v88 M700 248 h80" stroke="#fff" stroke-width="18" stroke-linecap="round"/>
  <text x="620" y="370" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26" font-weight="700" fill="#222">指示標誌</text>
  <text x="620" y="405" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#444">藍、綠、棕常見</text>
  <text x="620" y="435" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#444">路線、方向、設施與服務。</text>

  <rect x="930" y="190" width="190" height="120" rx="10" fill="#fff" stroke="#333" stroke-width="6"/>
  <text x="974" y="242" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="30" font-weight="700" fill="#111">前方</text>
  <text x="958" y="282" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="30" font-weight="700" fill="#111">200m</text>
  <text x="900" y="370" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26" font-weight="700" fill="#222">輔助標誌</text>
  <text x="900" y="405" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#444">補充距離、時間、車種</text>
  <text x="900" y="435" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20" fill="#444">要和主標誌一起讀。</text>

  <rect x="60" y="520" width="1080" height="150" rx="18" fill="#fff" stroke="#ddd"/>
  <text x="90" y="565" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="24" font-weight="700" fill="#222">考場判讀口訣</text>
  <text x="90" y="605" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" fill="#333">紅色先想「不能」或「必須停讓」；黃色先想「小心」；藍色先想「遵行或設施」；綠色先想「方向路線」。</text>
  <text x="90" y="642" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" fill="#333">看到附牌要合併判斷，例如「禁止停車」加「7-9」代表指定時段內適用。</text>
</svg>
